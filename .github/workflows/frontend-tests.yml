name: Frontend Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Prototype/PrototypeFrontend/PrototypeUi/package-lock.json

      - name: Install dependencies
        working-directory: Prototype/PrototypeFrontend/PrototypeUi
        run: npm ci

      - name: Run tests
        working-directory: Prototype/PrototypeFrontend/PrototypeUi
        run: npm test
