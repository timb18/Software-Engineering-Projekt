services:
  # ─── Production (main) ────────────────────────────────────────────────────

  - type: web
    name: teapot-api
    runtime: docker
    branch: main
    rootDir: Backend/TeapotApi
    dockerfilePath: ./Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_HTTP_PORTS
        value: 8080

  - type: web
    name: office-dashboard
    runtime: static
    branch: main
    rootDir: Prototype/PrototypeFrontend/PrototypeUi
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: teapot-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Staging (dev) ────────────────────────────────────────────────────────

  - type: web
    name: teapot-api-staging
    runtime: docker
    branch: dev
    rootDir: Backend/TeapotApi
    dockerfilePath: ./Api/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: ASPNETCORE_HTTP_PORTS
        value: 8080

  - type: web
    name: office-dashboard-staging
    runtime: static
    branch: dev
    rootDir: Prototype/PrototypeFrontend/PrototypeUi
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: teapot-api-staging
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
